<svg viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg" width="280" height="60">
  <defs>
    <style>
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .star-icon {
        animation: spin-slow 3s linear infinite;
        transform-origin: 15px 30px;
      }
      .star-icon:hover {
        animation-play-state: paused;
      }
    </style>
  </defs>

  <!-- Star Icon -->
  <g class="star-icon">
    <polygon points="15,5 18,15 28,15 20,22 23,32 15,26 7,32 10,22 2,15 12,15" fill="#9333EA" opacity="0.9"/>
  </g>

  <!-- Text: MiMundoMagico -->
  <text x="40" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#7C3AED" letter-spacing="-0.5">MiMundoMagico</text>
</svg>
